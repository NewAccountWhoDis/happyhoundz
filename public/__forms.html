<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="appointment" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="appointment" />
      <input name="bot-field" type="text" />
      <input name="name" type="text" />
      <input name="phone" type="text" />
      <input name="dog_name" type="text" />
      <input name="breed" type="text" />
      <input name="service" type="text" />
      <select name="preferred_days" multiple>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
      </select>
      <input name="preferred_time" type="text" />
      <textarea name="notes"></textarea>
    </form>
  </body>
</html>
